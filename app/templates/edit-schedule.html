{% extends 'layout.html' %}
{% block content %}
<section class="p-2 md:p-4">
 
    <script>
        const unchangedSchedule = {{ schedule|tojson|safe }};
        let currentSchedule = {{ schedule|tojson|safe }};
        let scheduleExercises = [];
        Object.keys(currentSchedule.days).forEach(day => {
            currentSchedule.days[day].exercises.forEach(exercise => { scheduleExercises.push(exercise) })
        });
    </script>
    <script src="{{ url_for('static', filename='js/musclesWorked/diagram.bundle.js') }}"></script>
    <script src="{{ url_for('static', filename='js/edit-schedules.js') }}"></script>
    <script src="{{ url_for('static', filename='js/saveShare.js') }}"></script>
 
    <div class="grid grid-cols-1 lg:grid-cols-7 gap-4 !p-0">
 
        <!-- Day Selector -->
        <div class="lg:col-span-7 baseCard">
            <main id="scheduleContainer" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-2 !p-4">
                <!-- Day cards inserted here by JS -->
            </main>
            <script>
                const container = document.getElementById("scheduleContainer");
                container.innerHTML = "";
                let dayCount = 0;
                var currentDay = "Monday";
                loadSchedulePage();
            </script>
        </div>
 
        <!-- Info Panel -->
        <div class="lg:col-span-4 baseCard flex flex-col gap-4 p-2">
            <div id="scheduleInfo">
                <h1 id="scheduleName">{{schedule.name}}</h1>
                <p id="scheduleDescription">{{schedule.description}}</p>
                <button class="darkBtn w-full md:w-auto" id="editScheduleStringsBtn" onclick="editScheduleDetails()">Edit Details</button>
            </div>
 
            <div id="workoutInfo" class="is-hidden">
                <h1 id="workoutName">Workout Name</h1>
                <p id="workoutDescription">Workout Description</p>
                <button class="darkBtn w-full md:w-auto mb-4" id="editWorkoutStringsBtn" onclick="editWorkoutDetails()">Edit Workout Details</button>
                <h3>Edit Day</h3>
                <div class="table-wrap max-h-[200px]">
                    <table id="exerciseTable"></table>
                </div>
                <div class="flex flex-col sm:flex-row gap-2 mt-4">
                    <button class="baseBtn flex-1" onclick="getSavedWorkouts('{{ current_user.id }}')" data-modal-target="loadSaved-modal" data-modal-toggle="loadSaved-modal">Load Template</button>
                    <button class="baseBtn flex-1" onclick="shareSaveWorkout(currentSchedule.days[currentDay], '{{ current_user.username }}', true, '{{ current_user.id }}')">Save as Template</button>
                </div>
            </div>
        </div>
 
        <!-- Muscles Diagram -->
        <div class="lg:col-span-3 baseCard flex flex-col gap-4 p-4">
            <h3 class="text-center">Muscles Worked</h3>
            <div class="grid grid-cols-2 gap-2 !p-0">
                <div class="baseCard min-h-[200px]" id="musclesWorkedAnterior"></div>
                <div class="baseCard min-h-[200px]" id="musclesWorkedPosterior"></div>
                <button class="baseBtn w-full col-span-2" onclick="changeDiagram(prepareExercises(), reset())">Reset Diagram</button>
            </div>
        </div>
 
        <!-- Search Tools -->
        <div class="lg:col-span-7 baseCard">
            <div class="grid grid-cols-1 md:grid-cols-6 gap-4 !p-4">
 
                <div class="md:col-span-2">
                    <h3>Find Exercises</h3>
                    <input type="text" id="exerciseSearchInput" class="input-search" placeholder="Search..." onkeydown="if(event.key === 'Enter') searchExercises()">
                </div>
                <div class="md:col-span-2">
                    <h3>Find Schedules</h3>
                    <input id="searchSchedule" type="text" class="input-search" placeholder="Search..." onkeyup="debouncedSearchSchedule()">
                </div>
                <div class="md:col-span-2">
                    <h3>Find Workouts</h3>
                    <input id="searchWorkout" type="text" class="input-search" placeholder="Search..." onkeyup="debouncedSearchWorkout()">
                </div>
 
                <div class="md:col-span-6 table-wrap max-h-[400px]">
                    <table id="exerciseSearchTable">
                        <thead>
                            <tr>
                                <th>Exercise</th>
                                <th>Details</th>
                                <th>Add</th>
                            </tr>
                        </thead>
                        <tbody id="exerciseTableBody"></tbody>
                    </table>
                </div>
 
                <div class="md:col-span-6 table-wrap max-h-[400px]">
                    <table id="sharedSearchTable"></table>
                </div>
 
                <div class="md:col-span-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-2">
                    <button class="baseBtn" onclick="revertChanges()">Undo Changes</button>
                    <button class="baseBtn" onclick="getSavedSchedules('{{ current_user.id }}')" data-modal-target="loadSaved-modal" data-modal-toggle="loadSaved-modal">Load Template</button>
                    <button class="baseBtn" onclick="shareSaveSchedule(currentSchedule, '{{ current_user.username }}', true, '{{ current_user.id }}')">Save Template</button>
                    <button class="darkBtn" onclick="saveChanges(currentSchedule, unchangedSchedule, UID)">Save Changes</button>
                </div>
            </div>
        </div>
 
    </div>
 
    <!-- Exercise Details Modal -->
    <div id="viewDetails-modal" class="modal-backdrop">
        <div class="modal-body max-w-2xl max-h-[90vh]">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 !p-0">
                <div>
                    <h3>Exercise Details:</h3>
                    <video class="baseCard w-full" id="exerciseVideo" autoplay loop muted playsinline></video>
                    <p id="exerciseTips"></p>
                </div>
            </div>
            <button data-modal-hide="viewDetails-modal" class="darkBtn w-full mt-4">Close</button>
        </div>
    </div>
 
    <!-- Load Template Modal -->
    <div id="loadSaved-modal" class="modal-backdrop">
        <div class="modal-body max-w-[915px] max-h-[80vh] flex flex-col">
            <h1 id="savedTitle" class="border-b border-default pb-2"></h1>
            <p id="noneFound" class="text-red-500"></p>
            <div class="flex-grow overflow-auto mt-4 table-wrap max-h-[400px]">
                <table id="savedItemsTable"></table>
            </div>
            <button data-modal-hide="loadSaved-modal" class="darkBtn w-full mt-4">Cancel</button>
        </div>
    </div>
 
</section>
{% endblock %}
