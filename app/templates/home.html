{% extends 'layout.html' %}
{% block content %}
<section class="p-2 md:p-4">
    <script>
        const currentSchedule = {{ schedule|tojson|safe }};
        const scheduleExercises = [];
        Object.keys(currentSchedule.days).forEach(day => {
            currentSchedule.days[day].exercises.forEach(exercise => { scheduleExercises.push(exercise) })
        });
    </script>
    <script src="{{ url_for('static', filename='js/musclesWorked/diagram.bundle.js') }}"></script>
    <script src="{{ url_for('static', filename='js/home.js') }}" type="module"></script>
    <script src="{{ url_for('static', filename='js/saveShare.js') }}"></script>
 
    <div class="grid grid-cols-1 lg:grid-cols-7 lg:grid-rows-7 gap-4 !p-0">
 
        <!-- Welcome -->
        <div class="lg:col-span-7 baseCard p-4">
            <h1>Welcome back, {{ current_user.firstName }}</h1>
            <h3>Ready to crush your next workout today?</h3>
        </div>
 
        <!-- Schedule -->
        <div class="lg:col-span-7 baseCard">
            <div class="flex justify-between items-center p-2">
                <h1>Current Schedule</h1>
                <button class="baseBtn" onclick="shareSaveSchedule(currentSchedule, '{{ current_user.username }}', false)">
                    <h3 class="p-0">Share</h3>
                </button>
            </div>
            <main id="scheduleContainer" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-2 md:gap-4 !p-4">
                <!-- day cards inserted here by JS -->
            </main>
            <script>
                const container = document.getElementById("scheduleContainer");
                container.innerHTML = "";
                var currentDay = "Monday";
            </script>
        </div>
 
        <!-- Recent Workouts -->
        <div class="lg:col-span-2 lg:row-span-5 baseCard flex flex-col gap-2">
            <h1>Recent Workouts</h1>
            <div class="p-4 flex flex-col gap-2">
                <button class="baseBtn w-full"><h3>Sun</h3><p>Workout Name</p></button>
                <button class="baseBtn w-full"><h3>Sun</h3><p>Workout Name</p></button>
            </div>
        </div>
 
        <!-- Quick Actions -->
        <div class="lg:col-span-2 lg:row-span-2 lg:col-start-3 baseCard">
            <h1>Quick Actions</h1>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 !p-4">
                <button class="baseBtn !p-2">Start Workout</button>
                <button class="baseBtn !p-2">History</button>
                <button class="baseBtn !p-2">Stats</button>
            </div>
        </div>
 
        <!-- Muscles Worked -->
        <div class="lg:col-span-3 lg:row-span-2 lg:col-start-5 baseCard">
            <h1>Muscles Worked</h1>
            <div class="grid grid-cols-2 gap-2 !p-4">
                <div class="baseCard min-h-[150px]" id="musclesWorkedAnterior"></div>
                <div class="baseCard min-h-[150px]" id="musclesWorkedPosterior"></div>
                <button class="baseBtn col-span-2 !py-2" onclick="changeDiagram(scheduleExercises)">Reset</button>
            </div>
        </div>
 
        <!-- PBs Chart -->
        <div class="lg:col-span-5 lg:row-span-3 lg:col-start-3 baseCard relative min-h-[300px]">
            <h1 id="PBs">PBs</h1>
            <div class="absolute top-20 bottom-4 left-4 right-4">
                <canvas id="pbsChart"></canvas>
            </div>
            <script>
                createChart({{ current_user.deadLift }}, {{ current_user.squat }}, {{ current_user.benchPress }}, {{ current_user.overheadPress }}, {{ current_user.snatch }}, {{ current_user.cleanAndJerk }});
            </script>
        </div>
 
    </div>
 
    <!-- Workout Modal -->
    <div id="viewDays-modal" class="modal-backdrop">
        <div class="relative w-full max-w-2xl max-h-[90vh] overflow-hidden bg-light border-4 border-default rounded-base flex flex-col">
            <div class="p-4 border-b border-default">
                <h1 id="workoutName">Workout Name</h1>
                <p id="workoutDescription">Workout Description</p>
            </div>
            <div class="flex-grow overflow-auto p-2 max-h-[400px]">
                <table id="exerciseTable"></table>
            </div>
            <div class="p-4">
                <button class="baseBtn w-full" onclick="shareSaveWorkout(currentSchedule.days[currentDay], '{{ current_user.username }}', false)">Share Workout</button>
            </div>
        </div>
    </div>
</section>
{% endblock %}
