{% extends 'layout.html' %}
{% block content %}
<section>
    <div class="centreScreen">
        <!-- Card, All placeholder info just ot have general idea of layout, can change entirely using forms instead! Maybe remove layout since no need for navbar if not signed in-->
        <div class="baseCard text-center">
            <div class="grid grid-cols-1 gap-4">
                <img src="" alt="StrengthTracker Logo"/>
                <h1>Welcome!</h1>
                <p>Sign Up to continue</p>
                <button class="baseBtn">Sign Up With Google</button>
                <button class="baseBtn">Sign Up With Facebook</button>
                <hr class="border-top: 8px solid bg-default border-radius: 5px">
                <h3 class="text-left">Email</h3>
                <input type="text" placeholder="Type here..." name="text" class="input">
                <h3 class="text-left">Password</h3>
                <input type="text" placeholder="Type here..." name="text" class="input">
                <h3 class="text-left">Confirm Password</h3>
                <input type="text" placeholder="Type here..." name="text" class="input">
                <button class="baseBtn">Sign Up</button>
            </div>
        </div>
      </div>
</section>
{% endblock %}
